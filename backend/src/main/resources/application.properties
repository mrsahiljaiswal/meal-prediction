spring.application.name=luminescent-pos
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/luminescent_db
spring.datasource.username=postgres
spring.datasource.password=vishalspostgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CSV dataset loader (run once on startup when enabled)
luminescent.dataloader.enabled=true

# Demo ingredient loader (generates Ingredient + MealIngredientMapping for /predict)
luminescent.dataloader.ingredients.enabled=true
