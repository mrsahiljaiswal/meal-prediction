data:
  raw_data_path: "data/raw/data.csv"
  # split from which week
  split_week: 130
  target_column: "num_orders"
  # You might want to define which features to drop if any
  drop_columns: ["id"] 
 

artifacts:
  # Directory where processed files will live
  artifacts_dir: "artifacts"
  # Specific paths for the split files
  train_data_path: "artifacts/train.csv"
  test_data_path: "artifacts/test.csv"
  # Path to save the combined X_train, y_train, etc. object
  transformed_data_path: "artifacts/transformed_data.pkl"

  model_dir: "artifacts/models"
  model_name: "best_lgbm_model.pkl"
  latest_data: "artifacts/data/historical_data/latest_data.csv"
  new_ingested_data: "artifacts/data/new_data/new_data.csv"
model:
  # RandomizedSearch settings
  n_iter: 5
  random_state: 42

  selected_model: "lightgbm"
  # selected_model: "xgboost"
  # selected_model: "catboost"

param_grids:
  lgb:
    n_estimators: [500, 1000]
    num_leaves: [31, 63]
    learning_rate: [0.01, 0.05]
  xgb:
    max_depth: [3, 5, 7]
    learning_rate: [0.01, 0.1]
  cat:
    depth: [4, 6, 8]
    iterations: [500, 1000]

mlflow:
  tracking_uri: ""
  experiment_name: "Meal_Demand_Forecasting"
  run_name: "LGBM_Base_Model"
  tags:
    data_set: "v1.0"
  
